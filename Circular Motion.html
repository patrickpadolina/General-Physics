<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Physics: Circular Motion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact&display=swap');

        body {
            background-color: #000000;
            background-image: radial-gradient(rgba(218, 0, 0, 0.3) 15%, transparent 16%),
                              radial-gradient(rgba(218, 0, 0, 0.3) 15%, transparent 16%);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
            color: #ffffff;
            font-family: 'Arial Black', Gadget, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Jagged Persona Style Header */
        .header-container {
            position: relative;
            transform: rotate(-3deg);
            margin-bottom: 25px;
            background: #d6001c;
            padding: 10px 40px;
            border: 4px solid #fff;
            box-shadow: 8px 8px 0px #000;
            text-align: center;
        }
        
        h1 {
            margin: 0;
            font-family: 'Impact', sans-serif;
            font-size: 2.6rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
        }

        h1 span {
            background: #000;
            color: #fff;
            padding: 0 12px;
            display: inline-block;
            transform: rotate(2deg) scale(1.05);
            margin-right: 8px;
        }

        p.subtitle {
            margin: 10px 0 0 0;
            font-size: 1rem;
            color: #000;
            background: #fff;
            padding: 4px 10px;
            font-weight: bold;
            text-transform: uppercase;
            transform: rotate(-1deg);
            box-shadow: 4px 4px 0px #000;
        }

        /* Core Layout Container */
        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Frame around the Canvas */
        #canvas-container {
            position: relative;
            background: #fff;
            padding: 12px;
            transform: rotate(1deg);
            box-shadow: 12px 12px 0px #d6001c, 20px 20px 0px #000;
            border: 4px solid #000;
        }

        canvas {
            display: block;
            background-color: #141414;
            cursor: pointer;
        }

        /* Styled Controls Panel */
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 20px;
            background: #000;
            border: 4px solid #fff;
            padding: 20px;
            transform: rotate(-1.5deg);
            box-shadow: -8px 8px 0px #d6001c, 8px -8px 0px #fff;
            align-items: center;
            width: 500px;
            box-sizing: border-box;
            justify-content: space-between;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        label {
            font-family: 'Impact', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #fff;
            text-transform: uppercase;
            background: #d6001c;
            padding: 2px 8px;
            transform: skewX(-10deg);
            letter-spacing: 1px;
        }

        /* Persona Stylized Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 150px;
            background: #fff;
            height: 8px;
            outline: none;
            border: 2px solid #000;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #d6001c;
            border: 2px solid #fff;
            cursor: pointer;
            transform: rotate(45deg);
        }

        /* Sharp Reset Button */
        button {
            background-color: #fff;
            color: #000;
            border: 4px solid #000;
            padding: 10px 20px;
            font-family: 'Impact', sans-serif;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
            box-shadow: 4px 4px 0px #d6001c;
            transform: skewX(-10deg);
        }

        button:hover {
            background-color: #d6001c;
            color: #fff;
            transform: skewX(-10deg) scale(1.05);
            box-shadow: 4px 4px 0px #fff;
        }

        /* Legend Banner */
        .legend {
            margin-top: 15px;
            display: flex;
            gap: 30px;
            font-size: 1rem;
            transform: rotate(1deg);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            color: #000;
            padding: 4px 12px;
            box-shadow: 4px 4px 0px #000;
            font-weight: 900;
            text-transform: uppercase;
        }

        .color-box {
            width: 16px;
            height: 16px;
            border: 2px solid #000;
            transform: rotate(15deg);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1><span>Phantom Physics:</span> Circular Motion</h1>
        <p class="subtitle">Click the canvas to release the thread!</p>
    </div>

    <div class="main-layout">
        <div id="canvas-container">
            <canvas id="simCanvas" width="500" height="500"></canvas>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background-color: #00ffcc;"></div>
                <span>Velocity (v)</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background-color: #ff3366;"></div>
                <span>Acceleration (a<sub>c</sub>)</span>
            </div>
        </div>

        <div class="controls">
            <div class="control-group" id="speedGroup">
                <label for="speedRange">SPEED (&omega;)</label>
                <input type="range" id="speedRange" min="0.005" max="0.05" step="0.002" value="0.02">
            </div>
            <div class="control-group" id="radiusGroup">
                <label for="radiusRange">RADIUS (r)</label>
                <input type="range" id="radiusRange" min="60" max="200" step="5" value="140">
            </div>
            <button id="resetBtn" style="display: none;">RE-ENGAGE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const speedRange = document.getElementById('speedRange');
        const radiusRange = document.getElementById('radiusRange');
        const resetBtn = document.getElementById('resetBtn');
        const speedGroup = document.getElementById('speedGroup');
        const radiusGroup = document.getElementById('radiusGroup');
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        let angle = 0;
        let isReleased = false;
        
        let ballX = 0;
        let ballY = 0;
        let vxLinear = 0;
        let vyLinear = 0;
        let snapshot = null;

        const velocityScale = 25;
        const accelerationScale = 500;

        function drawPersonaArrow(startX, startY, endX, endY, color, label, alpha = 1) {
            const headLength = 14; 
            const dx = endX - startX;
            const dy = endY - startY;
            const arrowAngle = Math.atan2(dy, dx);

            ctx.save();
            ctx.globalAlpha = alpha;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headLength * Math.cos(arrowAngle - Math.PI / 5), endY - headLength * Math.sin(arrowAngle - Math.PI / 5));
            ctx.lineTo(endX - headLength * Math.cos(arrowAngle + Math.PI / 5), endY - headLength * Math.sin(arrowAngle + Math.PI / 5));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.fillStyle = '#000';
            const offsetX = 22 * Math.cos(arrowAngle);
            const offsetY = 22 * Math.sin(arrowAngle);
            
            ctx.font = "italic bold 16px 'Impact', sans-serif";
            const textWidth = ctx.measureText(label).width;
            
            ctx.fillRect(endX + offsetX - 6, endY + offsetY - 14, textWidth + 12, 20);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(endX + offsetX - 6, endY + offsetY - 14, textWidth + 12, 20);

            ctx.fillStyle = color;
            ctx.fillText(label, endX + offsetX, endY + offsetY + 2);

            ctx.restore();
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function updateAndRender() {
            ctx.fillStyle = '#141414';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const omega = parseFloat(speedRange.value); 
            const r = parseFloat(radiusRange.value);       

            let vx, vy, ax, ay;

            ctx.strokeStyle = '#2d2d2d';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
            ctx.strokeStyle = '#d6001c';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 8]);
            ctx.stroke();
            ctx.setLineDash([]);

            if (!isReleased) {
                angle += omega;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);

                ballX = centerX + r * cos;
                ballY = centerY + r * sin;

                vx = -r * omega * sin;
                vy = r * omega * cos;
                ax = -r * omega * omega * cos;
                ay = -r * omega * omega * sin;

                vxLinear = vx;
                vyLinear = vy;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(ballX, ballY);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.stroke();

            } else {
                ballX += vxLinear;
                ballY += vyLinear;

                vx = vxLinear;
                vy = vyLinear;
                ax = 0; 
                ay = 0;

                if (snapshot) {
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY); 
                    ctx.lineTo(snapshot.x, snapshot.y);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();

                    drawStar(snapshot.x, snapshot.y, 4, 12, 5, '#fff');
                    ctx.restore();

                    drawPersonaArrow(snapshot.x, snapshot.y, snapshot.x + snapshot.vx * velocityScale, snapshot.y + snapshot.vy * velocityScale, '#00ffcc', 'LAUNCH V', 0.25);
                }

                if (ballX < -50 || ballX > canvas.width + 50 || ballY < -50 || ballY > canvas.height + 50) {
                    resetBtn.style.display = 'block';
                }
            }

            drawStar(centerX, centerY, 4, 14, 6, '#fff');
            drawStar(centerX, centerY, 4, 8, 3, '#d6001c');

            if (Math.abs(vx) > 0 || Math.abs(vy) > 0) {
                drawPersonaArrow(ballX, ballY, ballX + vx * velocityScale, ballY + vy * velocityScale, '#00ffcc', 'V');
            }
            if (Math.abs(ax) > 0 || Math.abs(ay) > 0) {
                drawPersonaArrow(ballX, ballY, ballX + ax * accelerationScale, ballY + ay * accelerationScale, '#ff3366', 'Ac');
            }

            ctx.save();
            ctx.translate(ballX, ballY);
            ctx.rotate(angle * 2);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-12, -12, 24, 24);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(-12, -12, 24, 24);
            ctx.fillStyle = isReleased ? '#d6001c' : '#000';
            ctx.fillRect(-7, -7, 14, 14);
            ctx.restore();

            requestAnimationFrame(updateAndRender);
        }

        canvas.addEventListener('click', () => {
            if (!isReleased) {
                isReleased = true;
                snapshot = { x: ballX, y: ballY, vx: vxLinear, vy: vyLinear };
                speedGroup.style.opacity = '0.2';
                radiusGroup.style.opacity = '0.2';
                speedRange.disabled = true;
                radiusRange.disabled = true;
            }
        });

        resetBtn.addEventListener('click', () => {
            isReleased = false;
            snapshot = null;
            resetBtn.style.display = 'none';
            speedGroup.style.opacity = '1';
            radiusGroup.style.opacity = '1';
            speedRange.disabled = false;
            radiusRange.disabled = false;
        });

        updateAndRender();
    </script>
</body>
</html>
